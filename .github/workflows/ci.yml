name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "feat/**"

permissions:
  contents: read

env:
  PYTHONPATH: src

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Lint
        run: uv run --with-requirements requirements-dev.txt ruff check src tests

      - name: Test
        run: >
          uv run --with-requirements requirements-dev.txt
          pytest --cov=src/fel_dolby_vision_movies --cov-report=term-missing

      - name: Benchmark
        run: |
          if [ -f src/fel_dolby_vision_movies/benchmark.py ] && [ -f tests/fixtures/benchmark_cases.json ]; then
            uv run --with-requirements requirements-dev.txt python -m fel_dolby_vision_movies.benchmark tests/fixtures/benchmark_cases.json
          else
            echo "benchmark is not implemented yet"
          fi
