name: Scrape and Propose Data Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * *"

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: data-refresh-pr
  cancel-in-progress: false

env:
  PYTHONPATH: src
  PR_BRANCH: daily-fel-refresh

jobs:
  scrape:
    # Runs on a self-hosted runner (home server, residential IP) because
    # Reddit returns 403 Blocked to GitHub's datacenter IPs, which prevents
    # the always-FEL Reddit lists from being scraped on ubuntu-latest. The
    # custom `reddit-scraper` label keeps this job pinned to that runner;
    # all other workflows (ci.yml, claude-code-review.yml) stay hosted.
    runs-on: [self-hosted, reddit-scraper]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Prepare refresh branch
        id: prepare_branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git fetch origin main:refs/remotes/origin/main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          pr_number="$(gh pr list \
            --base main \
            --head "$PR_BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // ""')"
          if [ -n "$pr_number" ]; then
            git fetch origin "$PR_BRANCH:refs/remotes/origin/$PR_BRANCH"
            git checkout -B "$PR_BRANCH" "origin/$PR_BRANCH"
            git rebase origin/main
          else
            git checkout -B "$PR_BRANCH" origin/main
          fi
          git show origin/main:data/releases.json > "$RUNNER_TEMP/base-releases.json"
          cp data/releases.json "$RUNNER_TEMP/previous-releases.json"
          cp "$RUNNER_TEMP/base-releases.json" data/releases.json
          git checkout origin/main -- data/posters
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Run tests before scraping
        run: >
          uv run --with-requirements requirements-dev.txt
          pytest --cov=src --cov-report=term-missing

      - name: Run scraper
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: >
          uv run --with-requirements requirements.txt
          python -m main run --sources data/sources_needs_evidence.txt
          --review-output "$RUNNER_TEMP/python-reconciliation-review.json"

      - name: Run AI discovery and scraping
        env:
          OPENAI_API_KEY: ${{ secrets.CODEX_API_KEY }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: >
          uv run --with-requirements requirements.txt
          python -m main ai-scrape --sources data/sources_needs_evidence.txt
          --review-output "$RUNNER_TEMP/ai-reconciliation-review.json"

      - name: Upload reconciliation reviews
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: fel-reconciliation-review
          path: |
            ${{ runner.temp }}/python-reconciliation-review.json
            ${{ runner.temp }}/ai-reconciliation-review.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Restore source registry from main
        run: git checkout origin/main -- data/sources_needs_evidence.txt

      - name: Prune refresh-only stale posters
        run: >
          uv run --with-requirements requirements.txt
          python -m main prune-posters
          --releases data/releases.json
          --poster-dir data/posters
          --base-ref origin/main
          --include-added
          --include-untracked

      - name: Summarize release additions
        id: release_delta
        run: >
          uv run --with-requirements requirements.txt
          python -m main pr-summary
          --base-releases "$RUNNER_TEMP/base-releases.json"
          --previous-releases "$RUNNER_TEMP/previous-releases.json"
          --head-releases data/releases.json
          --body-output "$RUNNER_TEMP/pr-body.md"
          --github-output "$GITHUB_OUTPUT"

      - name: Check refresh branch changes
        id: refresh_changes
        run: |
          git add data/releases.json data/posters data/sources_needs_evidence.txt
          if git diff --cached --quiet; then
            echo "has_tracked_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_tracked_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Update refresh branch and PR
        if: >
          steps.refresh_changes.outputs.has_tracked_changes == 'true' &&
          steps.release_delta.outputs.pending_release_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.prepare_branch.outputs.pr_number }}
        run: |
          git add data/releases.json data/posters data/sources_needs_evidence.txt
          if git diff --cached --quiet; then
            echo "new releases were detected, but no tracked files changed"
          else
            git commit -m "chore: refresh FEL releases data"
            # The refresh branch is deleted whenever its PR merges/closes, so on
            # the next run it does not exist on the remote yet. A plain fetch of a
            # missing ref exits 128 and, under `bash -e`, aborts before the push
            # below -- leaving the branch/PR permanently uncreated. Tolerate the
            # miss; force-with-lease still creates the branch from scratch.
            git fetch origin "$PR_BRANCH:refs/remotes/origin/$PR_BRANCH" || true
            git push --force-with-lease origin "HEAD:$PR_BRANCH"
            if [ -n "$PR_NUMBER" ]; then
              gh pr edit "$PR_NUMBER" --body-file "$RUNNER_TEMP/pr-body.md"
            else
              gh pr create \
                --base main \
                --head "$PR_BRANCH" \
                --title "chore: refresh FEL releases data" \
                --body-file "$RUNNER_TEMP/pr-body.md"
            fi
            gh workflow run ci.yml --ref "$PR_BRANCH"
          fi

      - name: Close empty refresh PR
        if: >
          steps.release_delta.outputs.pending_release_count == '0' &&
          steps.prepare_branch.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.prepare_branch.outputs.pr_number }}
        run: |
          git add data/releases.json data/posters data/sources_needs_evidence.txt
          if git diff --cached --quiet; then
            echo "refresh branch already has no pending release additions"
          else
            git commit -m "chore: clear empty FEL refresh"
            git fetch origin "$PR_BRANCH:refs/remotes/origin/$PR_BRANCH" || true
            git push --force-with-lease origin "HEAD:$PR_BRANCH"
          fi
          gh pr close "$PR_NUMBER" \
            --delete-branch \
            --comment "No pending FEL release additions remain after the latest refresh; closing this stale refresh PR."

      - name: No new FEL releases
        if: >
          steps.prepare_branch.outputs.pr_number == '' &&
          (
            steps.refresh_changes.outputs.has_tracked_changes != 'true' ||
            steps.release_delta.outputs.pending_release_count == '0'
          )
        run: echo "No refresh PR data changes found; leaving the refresh PR unchanged."
