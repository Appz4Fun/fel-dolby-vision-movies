name: Secret Smoke Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  brave-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Brave Search secret is configured
        env:
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: |
          if [ -z "$BRAVE_SEARCH_API_KEY" ]; then
            echo "BRAVE_SEARCH_API_KEY is not configured"
            exit 1
          fi
          echo "BRAVE_SEARCH_API_KEY is configured"
