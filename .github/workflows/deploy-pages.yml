name: Deploy Pages

# Fast path: re-render and publish the GitHub Pages site on every push to
# main WITHOUT scraping or AI extraction. The daily scrape workflow opens or
# updates a data-refresh PR; after that PR is manually merged, this workflow
# publishes the committed data to GitHub Pages.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Keep Pages deployments serialized when push and manual rebuilds overlap.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  PYTHONPATH: src

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build dashboard (no scrape, no AI)
        run: python -m build_pages

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
